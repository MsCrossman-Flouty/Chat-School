<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHAT School</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Fredoka',sans-serif;
background:linear-gradient(135deg,#ffdff0,#dff6ff,#f3e3ff,#fff9cc);
min-height:100vh;
overflow-x:hidden;
color:#000;
}

/* clouds */
.cloud{
position:fixed;
font-size:70px;
opacity:.95;
pointer-events:none;
animation:float 6s ease-in-out infinite;
z-index:0;
}

.c1{top:10px;left:10px;}
.c2{top:80px;right:20px;}
.c3{top:250px;left:25px;}
.c4{bottom:180px;right:25px;}
.c5{bottom:30px;left:90px;}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-14px);}
100%{transform:translateY(0);}
}

header{
background:#fff;
padding:24px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,.08);
position:relative;
z-index:2;
}

header h1{
font-size:42px;
}

.page{
display:none;
padding:20px;
max-width:950px;
margin:auto;
position:relative;
z-index:2;
animation:fade .35s;
}

.show{
display:block;
}

@keyframes fade{
from{opacity:0;transform:translateY(15px);}
to{opacity:1;transform:translateY(0);}
}

.card{
background:#fff;
padding:22px;
border-radius:24px;
box-shadow:0 10px 20px rgba(0,0,0,.08);
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-top:12px;
border-radius:14px;
border:1px solid #ccc;
font-size:16px;
font-family:'Fredoka',sans-serif;
}

button{
border:none;
padding:12px 18px;
border-radius:16px;
cursor:pointer;
font-family:'Fredoka',sans-serif;
font-weight:bold;
background:linear-gradient(135deg,#ffd6ec,#ffc2f1);
margin-top:12px;
transition:.2s;
}

button:hover{
transform:scale(1.05);
}

nav{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
padding:15px;
}

li{
list-style:none;
padding:12px;
margin:10px 0;
background:#f7f8ff;
border-radius:14px;
}

.grade{
padding:12px;
background:#eef8ff;
border-radius:14px;
margin-top:10px;
}

footer{
text-align:center;
padding:20px;
font-size:14px;
}
</style>
</head>
<body>

<div class="cloud c1">☁️</div>
<div class="cloud c2">☁️</div>
<div class="cloud c3">☁️</div>
<div class="cloud c4">☁️</div>
<div class="cloud c5">☁️</div>

<header>
<h1>🌸 CHAT School 🌸</h1>
<p>Cute Final Version</p>
</header>

<!-- LOGIN -->
<div id="loginPage" class="page show">
<div class="card">
<h2>✨ Login ✨</h2>

<input id="user" placeholder="Username">
<input id="pw" placeholder="Password (optional)">
<input id="classCode" placeholder="Enter Class Code">

<label style="display:block;margin-top:12px;">
<input type="checkbox" id="remember">
Keep me signed in
</label>

<button onclick="login()">Enter School</button>
</div>
</div>

<!-- WEBSITE -->
<div id="site" style="display:none;">

<nav>
<button onclick="openPage('home')">Home</button>
<button onclick="openPage('profile')">Profile</button>
<button onclick="openPage('assignments')">Assignments</button>
<button onclick="openPage('grades')">Grades</button>
<button onclick="logout()">Logout</button>
</nav>

<!-- HOME -->
<div id="home" class="page show">
<div class="card">
<h2 id="welcome"></h2>
<p>Everyone who enters any class code gets here 😎</p>
</div>
</div>

<!-- PROFILE -->
<div id="profile" class="page">
<div class="card">
<h2>👤 Student Profile</h2>
<div id="profileBox"></div>
</div>
</div>

<!-- ASSIGNMENTS -->
<div id="assignments" class="page">
<div class="card">
<h2>📚 Assignments</h2>
<ul>
<li>Math worksheet page 12</li>
<li>Read chapter 7 tonight</li>
<li>Science project due Friday</li>
</ul>
</div>
</div>

<!-- GRADES -->
<div id="grades" class="page">
<div class="card">
<h2>🎓 Grades</h2>
<div class="grade">Math: 95%</div>
<div class="grade">Reading: 91%</div>
<div class="grade">Science: 97%</div>
</div>
</div>

<footer>CHAT School ✨</footer>

</div>

<script>
let currentUser="";
let currentCode="";

function login(){

currentUser=document.getElementById("user").value.trim();
currentCode=document.getElementById("classCode").value.trim();

if(currentUser==""){
alert("Enter username");
return;
}

if(currentCode==""){
alert("Enter class code");
return;
}

/* password optional */

/* remember me */
if(document.getElementById("remember").checked){
localStorage.setItem("savedUser",currentUser);
localStorage.setItem("savedCode",currentCode);
}else{
localStorage.removeItem("savedUser");
localStorage.removeItem("savedCode");
}

document.getElementById("loginPage").style.display="none";
document.getElementById("site").style.display="block";

document.getElementById("welcome").innerText=
"Welcome " + currentUser + "! Joined class: " + currentCode;

document.getElementById("profileBox").innerHTML=
"🌸 <b>" + currentUser + "</b><br>Class Code: " + currentCode + "<br>Favorite Subject: Art";
}

function openPage(id){
document.querySelectorAll(".page").forEach(page=>page.classList.remove("show"));
document.getElementById(id).classList.add("show");
}

function logout(){
localStorage.removeItem("savedUser");
localStorage.removeItem("savedCode");
location.reload();
}

window.onload=function(){

let savedUser=localStorage.getItem("savedUser");
let savedCode=localStorage.getItem("savedCode");

if(savedUser && savedCode){
document.getElementById("user").value=savedUser;
document.getElementById("classCode").value=savedCode;
document.getElementById("remember").checked=true;
login();
}
}
</script>

</body>
</html>

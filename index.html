<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C.H.A.T. Academy</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ffd6ec,#d6f0ff,#eadcff);
text-align:center;
color:#444;
}
header{
padding:25px;
background:#ffffffcc;
}
.card{
background:white;
max-width:900px;
margin:20px auto;
padding:20px;
border-radius:20px;
box-shadow:0 8px 18px rgba(0,0,0,.08);
}
input,button,textarea{
padding:10px;
margin:8px;
border-radius:12px;
border:1px solid #ccc;
width:80%;
max-width:320px;
}
button{
background:#b8e1ff;
font-weight:bold;
cursor:pointer;
}
.hidden{display:none;}
.msg{
background:#f7f7ff;
padding:8px;
margin:6px;
border-radius:12px;
text-align:left;
}
</style>
</head>
<body>

<header>
<h1>C.H.A.T.</h1>
<p>Chill Happy and Triumphant</p>
<p><i>Feles laeta est feles triumphans</i></p>
</header>

<div class="card" id="loginBox">
<h2>Enter School</h2>
<input id="nick" placeholder="Nickname or Admin Name">
<br>
<input id="pw" placeholder="Password (admin only)">
<br>
<input id="room" placeholder="Class Code">
<br>
<button onclick="login()">Join</button>
</div>

<div id="app" class="hidden">

<div class="card">
<h2 id="welcome"></h2>
</div>

<div class="card">
<h2>📌 Assignments</h2>
<ul id="assignments">
<li>Math worksheet Friday</li>
<li>Science poster Monday</li>
</ul>
</div>

<div class="card hidden" id="adminPanel">
<h2>👑 Admin Panel</h2>
<textarea id="newTask" placeholder="New assignment"></textarea>
<br>
<button onclick="addTask()">Add Assignment</button>
</div>

<div class="card">
<h2>💬 Chat</h2>
<div id="chatBox"></div>
<input id="chatInput" placeholder="Say something">
<br>
<button onclick="sendMsg()">Send</button>
</div>

</div>

<script>
let user="";
let room="";

function key(){ return "room_"+room; }

function login(){
user=document.getElementById("nick").value.trim();
let pw=document.getElementById("pw").value.trim();
room=document.getElementById("room").value.trim();

if(user=="" || room==""){ alert("Fill boxes"); return; }

document.getElementById("loginBox").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");
document.getElementById("welcome").innerText="Welcome " + user + "!";

if(user==="Ms. Crossman-Flouty" && pw==="Daisy12321"){
document.getElementById("adminPanel").classList.remove("hidden");
document.getElementById("welcome").innerText="👑 Welcome Admin!";
}

loadMsgs();
}

function sendMsg(){
let text=document.getElementById("chatInput").value.trim();
if(text=="") return;

let msgs=JSON.parse(localStorage.getItem(key()) || "[]");
msgs.push(user + ": " + text);
localStorage.setItem(key(), JSON.stringify(msgs));

document.getElementById("chatInput").value="";
loadMsgs();
}

function loadMsgs(){
let msgs=JSON.parse(localStorage.getItem(key()) || "[]");
let box=document.getElementById("chatBox");
box.innerHTML="";
msgs.forEach(m=>{
box.innerHTML += "<div class='msg'>"+m+"</div>";
});
}

function addTask(){
let task=document.getElementById("newTask").value.trim();
if(task=="") return;

let ul=document.getElementById("assignments");
ul.innerHTML += "<li>"+task+"</li>";
document.getElementById("newTask").value="";
}
</script>

</body>
</html>

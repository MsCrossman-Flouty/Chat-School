<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CHAT School</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Quicksand',sans-serif;
background:linear-gradient(135deg,#ffe6f6,#eef8ff,#fff7cf);
color:#000;
min-height:100vh;
overflow-x:hidden;
}

h1,h2,h3,button{
font-family:'Fredoka',sans-serif;
}

.sky{
position:fixed;
inset:0;
z-index:-1;
pointer-events:none;
overflow:hidden;
}

.cloud,.star{
position:absolute;
animation:float 5s ease-in-out infinite;
}

.cloud{
width:120px;
height:42px;
background:rgba(255,255,255,.9);
border-radius:40px;
}

.cloud:before,.cloud:after{
content:"";
position:absolute;
background:rgba(255,255,255,.9);
border-radius:50%;
}

.cloud:before{width:42px;height:42px;left:12px;top:-18px;}
.cloud:after{width:54px;height:54px;right:10px;top:-22px;}

.star{font-size:24px;}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

header{
background:#ffffffd8;
padding:24px;
text-align:center;
box-shadow:0 8px 18px rgba(0,0,0,.08);
}

nav{
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
padding:15px;
}

.page{display:none;padding:20px;}
.show{display:block;}

.card{
max-width:950px;
margin:auto;
background:white;
padding:22px;
border-radius:24px;
box-shadow:0 10px 20px rgba(0,0,0,.08);
margin-bottom:18px;
}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:16px;
border:1px solid #ddd;
font-size:16px;
}

button{
background:#ffc7e8;
border:none;
cursor:pointer;
font-weight:600;
}

.chatBox{
height:260px;
overflow:auto;
background:#f7f8ff;
padding:10px;
border-radius:18px;
margin-bottom:10px;
}

.msg,.assignment{
background:white;
padding:12px;
border-radius:16px;
margin-top:10px;
border:2px solid #ffe1f2;
}

.smallBtn{
width:auto;
padding:7px 12px;
margin-left:8px;
display:inline-block;
}

/* avatar */
.avatarWrap{
display:flex;
justify-content:center;
margin:20px 0;
}

.avatar{
width:250px;
height:250px;
position:relative;
}

.ear{
position:absolute;
top:35px;
width:46px;
height:46px;
border:4px solid #333;
border-radius:14px;
transform:rotate(45deg);
z-index:1;
}

.leftEar{left:70px;}
.rightEar{right:70px;}

.innerEar{
position:absolute;
width:18px;
height:18px;
background:pink;
left:11px;
top:11px;
border-radius:8px;
}

.head{
position:absolute;
left:58px;
top:48px;
width:134px;
height:115px;
border:4px solid #333;
border-radius:50%;
z-index:3;
}

.body{
position:absolute;
left:64px;
top:132px;
width:122px;
height:90px;
border:4px solid #333;
border-radius:50%;
z-index:2;
}

.eye{
position:absolute;
top:95px;
width:18px;
height:22px;
border-radius:50%;
z-index:4;
}

.leftEye{left:96px;}
.rightEye{right:96px;}

.eye:after{
content:"";
position:absolute;
width:6px;
height:6px;
background:white;
border-radius:50%;
left:4px;
top:4px;
}

.nose{
position:absolute;
left:118px;
top:118px;
width:12px;
height:10px;
background:pink;
border-radius:50%;
z-index:5;
}

.mouth{
position:absolute;
left:108px;
top:130px;
width:32px;
height:10px;
z-index:5;
}

.mouth:before,.mouth:after{
content:"";
position:absolute;
width:14px;
height:8px;
border-bottom:3px solid #333;
border-radius:0 0 12px 12px;
}

.mouth:before{left:0;}
.mouth:after{right:0;}

.tail{
position:absolute;
right:8px;
top:165px;
height:18px;
border:4px solid #333;
border-radius:30px;
transform:rotate(18deg);
transform-origin:left center;
}

.paw{
position:absolute;
bottom:22px;
width:24px;
height:18px;
border:3px solid #333;
border-radius:50%;
z-index:5;
}

.p1{left:88px;}
.p2{right:88px;}

footer{text-align:center;padding:30px;}
</style>
</head>
<body>

<div class="sky">
<div class="cloud" style="top:60px;left:6%;"></div>
<div class="cloud" style="top:140px;right:8%;animation-delay:1s;"></div>
<div class="cloud" style="top:320px;left:16%;animation-delay:2s;"></div>
<div class="star" style="top:60px;left:40%;">⭐</div>
<div class="star" style="top:160px;right:30%;">✨</div>
</div>

<header>
<h1>🌸 CHAT School 🌸</h1>
<p>Feles laeta est feles triumphans</p>
</header>

<!-- LOGIN -->
<div id="loginPage" class="page show">
<div class="card">
<h2>Login</h2>
<input id="user" placeholder="Username">
<input id="pw" placeholder="Password">
<input id="classCode" placeholder="Class Code">
<label><input type="checkbox" id="remember" style="width:auto;"> Keep me signed in</label>
<button onclick="login()">Enter School</button>
</div>
</div>

<!-- SITE -->
<div id="site" style="display:none;">

<nav>
<button onclick="openPage('home')">Home</button>
<button onclick="openPage('assignments')">Assignments</button>
<button onclick="openPage('avatarPage')">Avatar</button>
<button onclick="openPage('profile')">Profile</button>
<button onclick="openPage('chat')">Chat</button>
<button id="adminBtn" style="display:none;" onclick="openPage('admin')">Teacher</button>
<button onclick="logout()">Logout</button>
</nav>

<div id="home" class="page show">
<div class="card">
<h2 id="welcome"></h2>
<p>Welcome to the cutest classroom ever ✨</p>
</div>
</div>

<div id="assignments" class="page">
<div class="card">
<h2>Assignments</h2>
<div id="assignList"></div>
</div>
</div>

<div id="profile" class="page">
<div class="card">
<h2 id="profileName"></h2>
<p id="profileClass"></p>

<div class="assignment"><b>Age:</b> <span id="ageText">Not set</span>
<button class="smallBtn" onclick="editField('age')">✏</button></div>

<div class="assignment"><b>Favorite Color:</b> <span id="colorText">Not set</span>
<button class="smallBtn" onclick="editField('color')">✏</button></div>

<div class="assignment"><b>Favorite Animal:</b> <span id="animalText">Not set</span>
<button class="smallBtn" onclick="editField('animal')">✏</button></div>

<div class="assignment"><b>Favorite Subject:</b> <span id="subjectText">Not set</span>
<button class="smallBtn" onclick="editField('subject')">✏</button></div>

</div>
</div>

<div id="chat" class="page">
<div class="card">
<h2>Class Chat</h2>
<div class="chatBox" id="chatBox"></div>
<input id="chatInput" placeholder="Say something">
<button onclick="sendMsg()">Send</button>
</div>
</div>

<div id="admin" class="page">
<div class="card">
<h2>Teacher Controls</h2>
<input id="assignTitle" placeholder="Assignment title">
<input id="assignText" placeholder="Instructions">
<button onclick="postAssignment()">Post Assignment</button>

<input id="announceText" placeholder="Announcement">
<button onclick="postAnnouncement()">Send Announcement</button>

<button onclick="clearAssignments()">Delete Assignments</button>
<button onclick="clearChat()">Clear Chat</button>
</div>
</div>

<div id="avatarPage" class="page">
<div class="card">
<h2>Avatar Station</h2>

<div class="avatarWrap">
<div class="avatar">
<div class="ear leftEar" id="earL"><div class="innerEar"></div></div>
<div class="ear rightEar" id="earR"><div class="innerEar"></div></div>
<div class="tail" id="tail"></div>
<div class="body" id="bodyPart"></div>
<div class="head" id="headPart"></div>
<div class="eye leftEye" id="eye1"></div>
<div class="eye rightEye" id="eye2"></div>
<div class="nose"></div>
<div class="mouth"></div>
<div class="paw p1" id="paw1"></div>
<div class="paw p2" id="paw2"></div>
</div>
</div>

<label>Eye Color</label>
<select id="eyeColor">
<option>green</option><option>amber</option><option>black</option><option>blue</option><option>brown</option>
</select>

<label>Fur Color</label>
<select id="furColor">
<option>white</option><option>grey</option><option>black</option><option>brown</option><option>tan</option>
</select>

<label>Paw Color</label>
<select id="pawColor">
<option>white</option><option>grey</option><option>black</option><option>brown</option><option>tan</option>
</select>

<label>Ear Color</label>
<select id="earColor">
<option>white</option><option>grey</option><option>black</option><option>brown</option><option>tan</option>
</select>

<label>Tail Color</label>
<select id="tailColor">
<option>white</option><option>grey</option><option>black</option><option>brown</option><option>tan</option>
</select>

<label>Tail Length</label>
<select id="tailLength">
<option value="70">short</option>
<option value="100">medium</option>
<option value="150">long</option>
</select>

<label>Pattern</label>
<select id="pattern">
<option>none</option>
<option>stripes</option>
<option>spots</option>
<option>calico</option>
</select>

<button onclick="saveAvatar()">Save Avatar</button>

</div>
</div>
</div>
</div>
<footer>CHAT School 🌸</footer>

<script>
let currentUser="";
let currentCode="";
let isTeacher=false;

const colors={
green:"rgb(12,74,0)",
blue:"rgb(133,191,255)",
amber:"rgb(255,176,0)",
black:"rgb(0,0,0)",
white:"rgb(255,255,255)",
grey:"rgb(136,136,136)",
brown:"rgb(94,65,0)",
tan:"rgb(228,219,196)"
};

function c(x){return colors[x]||x;}

function login(){
currentUser=user.value.trim();
currentCode=classCode.value.trim();

if(currentUser==""||currentCode==""){
alert("Fill all boxes");
return;
}

isTeacher=false;
adminBtn.style.display="none";

if(currentUser=="Ms. Crossman-Flouty" && pw.value=="Daisy12321"){
isTeacher=true;
adminBtn.style.display="inline-block";
}

if(remember.checked){
localStorage.setItem("remember","yes");
localStorage.setItem("savedUser",currentUser);
localStorage.setItem("savedCode",currentCode);
}else{
localStorage.removeItem("remember");
localStorage.removeItem("savedUser");
localStorage.removeItem("savedCode");
}

loginPage.style.display="none";
site.style.display="block";

welcome.innerText="Welcome "+currentUser+" | "+currentCode;
profileName.innerText=currentUser;
profileClass.innerText="Class Code: "+currentCode;

loadAssignments();
loadChat();
loadProfile();
loadAvatar();
}

function logout(){
localStorage.removeItem("remember");
localStorage.removeItem("savedUser");
localStorage.removeItem("savedCode");

site.style.display="none";
loginPage.style.display="block";

user.value="";
pw.value="";
classCode.value="";
remember.checked=false;
}

window.onload=function(){

loginPage.style.display="block";
site.style.display="none";

if(localStorage.getItem("remember")=="yes"){
user.value=localStorage.getItem("savedUser") || "";
classCode.value=localStorage.getItem("savedCode") || "";
remember.checked=true;
login();
}

};

function openPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("show"));
document.getElementById(id).classList.add("show");
}

/* profile */
function editField(type){
let old=localStorage.getItem(currentUser+"_"+type)||"";
let val=prompt("Enter "+type+":",old);
if(val!==null){
localStorage.setItem(currentUser+"_"+type,val);
loadProfile();
}
}

function loadProfile(){
ageText.innerText=localStorage.getItem(currentUser+"_age")||"Not set";
colorText.innerText=localStorage.getItem(currentUser+"_color")||"Not set";
animalText.innerText=localStorage.getItem(currentUser+"_animal")||"Not set";
subjectText.innerText=localStorage.getItem(currentUser+"_subject")||"Not set";
}

/* chat */
function sendMsg(){
let t=chatInput.value.trim();
if(t=="")return;

let list=JSON.parse(localStorage.getItem("chat_"+currentCode))||[];
list.push({name:currentUser,text:t});
localStorage.setItem("chat_"+currentCode,JSON.stringify(list));

chatInput.value="";
loadChat();
}

function loadChat(){
chatBox.innerHTML=`<div class="msg"><b>Teacher</b>: Welcome class!</div>`;

let list=JSON.parse(localStorage.getItem("chat_"+currentCode))||[];

list.forEach(m=>{
chatBox.innerHTML+=`<div class="msg"><b>${m.name}</b>: ${m.text}</div>`;
});
}

/* assignments */
function loadAssignments(){
let list=JSON.parse(localStorage.getItem("assign_"+currentCode));

if(!list){
list=[
{title:"Math Homework",text:"Page 22 #1-10"},
{title:"Science",text:"Study planets"},
{title:"Reading",text:"Read 20 minutes"},
{title:"Writing",text:"Write one paragraph"},
{title:"History",text:"Read chapter 2"},
{title:"Spelling",text:"Study words"},
{title:"Art",text:"Draw a cat"},
{title:"Music",text:"Rhythm sheet"},
{title:"Typing",text:"Practice 10 mins"},
{title:"Kindness",text:"Help someone today"}
];
localStorage.setItem("assign_"+currentCode,JSON.stringify(list));
}

assignList.innerHTML="";
list.forEach(a=>{
assignList.innerHTML+=`<div class="assignment"><b>${a.title}</b><br>${a.text}</div>`;
});
}

function postAssignment(){
if(!isTeacher)return;

let list=JSON.parse(localStorage.getItem("assign_"+currentCode))||[];
list.push({title:assignTitle.value,text:assignText.value});
localStorage.setItem("assign_"+currentCode,JSON.stringify(list));
loadAssignments();
}

function postAnnouncement(){
if(!isTeacher)return;

let list=JSON.parse(localStorage.getItem("chat_"+currentCode))||[];
list.push({name:"Teacher",text:announceText.value});
localStorage.setItem("chat_"+currentCode,JSON.stringify(list));
loadChat();
}

function clearAssignments(){
localStorage.removeItem("assign_"+currentCode);
loadAssignments();
}

function clearChat(){
localStorage.removeItem("chat_"+currentCode);
loadChat();
}

/* avatar */
function saveAvatar(){
let data={
eyes:eyeColor.value,
fur:furColor.value,
paws:pawColor.value,
ears:earColor.value,
tail:tailColor.value,
tailLen:tailLength.value,
pattern:pattern.value
};

localStorage.setItem("avatar_"+currentUser,JSON.stringify(data));
loadAvatar();
}

function loadAvatar(){
let d=JSON.parse(localStorage.getItem("avatar_"+currentUser))||{
eyes:"green",fur:"white",paws:"white",ears:"white",tail:"white",tailLen:"100",pattern:"none"
};

headPart.style.background=c(d.fur);
bodyPart.style.background=c(d.fur);
paw1.style.background=c(d.paws);
paw2.style.background=c(d.paws);
earL.style.background=c(d.ears);
earR.style.background=c(d.ears);
tail.style.background=c(d.tail);
tail.style.width=d.tailLen+"px";
eye1.style.background=c(d.eyes);
eye2.style.background=c(d.eyes);
}
</script>

</body>
</html>

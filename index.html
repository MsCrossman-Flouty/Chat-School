<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHAT School</title>

<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Fredoka',sans-serif;
background:linear-gradient(135deg,#ffdff0,#dff6ff,#f3e3ff,#fff9cc);
min-height:100vh;
color:#222;
}

header{
background:white;
padding:25px;
text-align:center;
box-shadow:0 8px 18px rgba(0,0,0,.08);
}

header h1{font-size:42px;}

header p{
margin-top:8px;
color:#555;
}

.page{
display:none;
max-width:950px;
margin:auto;
padding:20px;
}

.show{display:block;}

.card{
background:white;
padding:24px;
border-radius:24px;
box-shadow:0 10px 20px rgba(0,0,0,.08);
margin-bottom:20px;
}

input,select{
width:100%;
padding:12px;
margin-top:12px;
border-radius:14px;
border:1px solid #ccc;
font-family:'Fredoka',sans-serif;
font-size:16px;
}

button{
border:none;
padding:12px 18px;
border-radius:16px;
cursor:pointer;
font-family:'Fredoka',sans-serif;
font-weight:bold;
background:linear-gradient(135deg,#ffd6ec,#ffc2f1);
margin-top:12px;
}

nav{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
padding:15px;
}

.avatar{
font-size:55px;
text-align:center;
margin:10px 0;
}

.chatBox{
height:250px;
overflow:auto;
background:#f8f8ff;
padding:10px;
border-radius:16px;
margin-bottom:10px;
}

.msg{
padding:8px;
margin:6px 0;
background:white;
border-radius:12px;
}

.centerCheck{
text-align:center;
margin-top:14px;
}

footer{
text-align:center;
padding:20px;
}
</style>
</head>

<body>

<header>
<h1>🌸 CHAT School 🌸</h1>
<p>Feles laeta est feles triumphans</p>
</header>

<!-- LOGIN -->
<div id="loginPage" class="page show">
<div class="card">

<h2>✨ Login ✨</h2>

<input id="user" placeholder="Username">
<input id="pw" placeholder="Password">
<input id="classCode" placeholder="Class Code">

<div class="centerCheck">
<label>
<input type="checkbox" id="remember">
Keep me signed in
</label>
</div>

<button onclick="login()">Enter School</button>

</div>
</div>

<!-- SITE -->
<div id="site" style="display:none;">

<nav>
<button onclick="openPage('home')">Home</button>
<button onclick="openPage('profile')">Profile</button>
<button onclick="openPage('chat')">Chat</button>
<button onclick="logout()">Logout</button>
</nav>

<!-- HOME -->
<div id="home" class="page show">
<div class="card">
<h2 id="welcome"></h2>
<p>Welcome to CHAT School ✨</p>
</div>
</div>

<!-- PROFILE -->
<div id="profile" class="page">
<div class="card">

<h2>👤 Edit Profile</h2>

<div class="avatar" id="avatarPreview">🐱</div>

<select id="breed">
<option>Cat</option>
<option>Fluffy Cat</option>
<option>Round Cat</option>
<option>Sleepy Cat</option>
</select>

<select id="color1">
<option>White</option>
<option>Black</option>
<option>Orange</option>
<option>Gray</option>
<option>Pink</option>
</select>

<select id="color2">
<option>None</option>
<option>White</option>
<option>Black</option>
<option>Orange</option>
<option>Gray</option>
<option>Pink</option>
</select>

<select id="fur">
<option>Short Fur</option>
<option>Medium Fur</option>
<option>Long Fur</option>
</select>

<select id="eyes">
<option>Blue Eyes</option>
<option>Green Eyes</option>
<option>Brown Eyes</option>
<option>Purple Eyes</option>
</select>

<button onclick="saveProfile()">Save Avatar</button>

<div id="profileInfo" style="margin-top:14px;"></div>

</div>
</div>

<!-- CHAT -->
<div id="chat" class="page">
<div class="card">

<h2>💬 Class Chat</h2>

<div class="chatBox" id="chatBox"></div>

<input id="chatInput" placeholder="Say something...">
<button onclick="sendMsg()">Send</button>

</div>
</div>

<footer>CHAT School ✨</footer>

</div>

<script>
let currentUser="";
let currentCode="";
let avatar="🐱";

/* LOGIN */
function login(){

currentUser=document.getElementById("user").value.trim();
let pw=document.getElementById("pw").value.trim();
currentCode=document.getElementById("classCode").value.trim();

if(currentUser==""){
alert("Enter username");
return;
}

if(currentCode==""){
alert("Enter class code");
return;
}

/* ADMIN MODE */
if(currentUser=="Ms. Crossman-Flouty" && pw=="Daisy12321"){
currentCode="ADMIN";
}

/* KEEP SIGNED IN */
if(document.getElementById("remember").checked"){
localStorage.setItem("savedUser",currentUser);
localStorage.setItem("savedPw",pw);
localStorage.setItem("savedCode",currentCode);
}else{
localStorage.removeItem("savedUser");
localStorage.removeItem("savedPw");
localStorage.removeItem("savedCode");
}

document.getElementById("loginPage").style.display="none";
document.getElementById("site").style.display="block";

let text="Welcome " + currentUser;

if(currentCode=="ADMIN"){
text+=" 👑 Admin Mode";
}else{
text+=" | Joined: " + currentCode;
}

document.getElementById("welcome").innerText=text;

loadProfile();
loadChat();
}

/* PAGE */
function openPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("show"));
document.getElementById(id).classList.add("show");
}

/* LOGOUT */
function logout(){
localStorage.clear();
location.reload();
}

/* PROFILE */
function saveProfile(){

let breed=document.getElementById("breed").value;
let c1=document.getElementById("color1").value;
let c2=document.getElementById("color2").value;
let fur=document.getElementById("fur").value;
let eyes=document.getElementById("eyes").value;

avatar="🐱";

document.getElementById("avatarPreview").innerText=avatar;

localStorage.setItem("avatar",avatar);
localStorage.setItem("profileText",
breed+" | "+c1+" & "+c2+" | "+fur+" | "+eyes);

loadProfile();
}

function loadProfile(){

avatar=localStorage.getItem("avatar") || "🐱";
let txt=localStorage.getItem("profileText") || "No custom avatar yet.";

document.getElementById("avatarPreview").innerText=avatar;
document.getElementById("profileInfo").innerHTML=
"<b>"+currentUser+"</b><br>"+txt;
}

/* CHAT */
function sendMsg(){

let msg=document.getElementById("chatInput").value.trim();
if(msg=="") return;

let old=JSON.parse(localStorage.getItem("chatMsgs") || "[]");

old.push({
name:currentUser,
avatar:avatar,
text:msg
});

localStorage.setItem("chatMsgs",JSON.stringify(old));
document.getElementById("chatInput").value="";
loadChat();
}

function loadChat(){

let msgs=JSON.parse(localStorage.getItem("chatMsgs") || "[]");
let box=document.getElementById("chatBox");

box.innerHTML="";

msgs.forEach(m=>{
box.innerHTML+=
"<div class='msg'>"+m.avatar+" <b>"+m.name+
"</b>: "+m.text+"</div>";
});

box.scrollTop=box.scrollHeight;
}

/* AUTO LOGIN */
window.onload=function(){

let u=localStorage.getItem("savedUser");
let p=localStorage.getItem("savedPw");
let c=localStorage.getItem("savedCode");

if(u && c){
document.getElementById("user").value=u;
document.getElementById("pw").value=p;
document.getElementById("classCode").value=c;
document.getElementById("remember").checked=true;
login();
}
}
</script>

</body>
</html>
